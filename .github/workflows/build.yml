name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project OpenRouterDesktop.xcodeproj \
            -scheme OpenRouterDesktop \
            -destination 'platform=macOS' \
            -configuration Debug \
            build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || (xcodebuild -project OpenRouterDesktop.xcodeproj -scheme OpenRouterDesktop -destination 'platform=macOS' -configuration Debug build CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO)
