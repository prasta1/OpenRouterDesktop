name: OpenRouterDesktop
options:
  bundleIdPrefix: com.openrouter
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

packages:
  swift-markdown-ui:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  Splash:
    url: https://github.com/JohnSundell/Splash
    from: "0.16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  OpenRouterDesktop:
    type: application
    platform: macOS
    sources:
      - path: OpenRouterDesktop
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: swift-markdown-ui
        product: MarkdownUI
      - package: Splash
        product: Splash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openrouter.desktop
        PRODUCT_NAME: OpenRouterDesktop
        INFOPLIST_FILE: OpenRouterDesktop/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenRouterDesktop/OpenRouterDesktop.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: OpenRouterDesktop/OpenRouterDesktop.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  OpenRouterDesktopTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenRouterDesktopTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: OpenRouterDesktop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openrouter.desktop.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/OpenRouterDesktop.app/Contents/MacOS/OpenRouterDesktop

schemes:
  OpenRouterDesktop:
    build:
      targets:
        OpenRouterDesktop: all
        OpenRouterDesktopTests: [test]
    test:
      targets:
        - OpenRouterDesktopTests
